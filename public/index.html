<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Simples - Trading</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
        .card { background: #222; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 400px; border: 1px solid #333; }
        h1 { color: #f0b90b; }
        .price { font-size: 40px; font-weight: bold; color: #0ecb81; margin: 20px 0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; margin: 5px; font-weight: bold; }
        .btn-update { background: #f0b90b; color: #000; }
        .btn-telegram { background: #0088cc; color: #fff; }
        #log { color: #888; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎯 Trading MVP</h1>
        <p>Teste de conexão com Binance e Telegram</p>
        
        <div id="priceDisplay" class="price">Carregando...</div>
        
        <button class="btn-update" onclick="fetchPrice()">🔄 Atualizar Preço</button>
        <hr style="border-color: #333; margin: 15px 0;">
        <button class="btn-telegram" onclick="sendAlert()">📢 Enviar Teste Telegram</button>
    </div>

    <div id="log">Aguardando ação...</div>

    <script>
        const log = document.getElementById('log');
        const priceDisplay = document.getElementById('priceDisplay');
        let currentPrice = 0;

        // Função para buscar preço da Binance
        async function fetchPrice() {
            log.innerText = "Buscando preço na Binance...";
            try {
                const response = await fetch('/api/price?symbol=BTCUSDT');
                const data = await response.json();
                
                currentPrice = parseFloat(data.price);
                priceDisplay.innerText = `$ ${currentPrice.toFixed(2)}`;
                priceDisplay.style.color = currentPrice > 60000 ? '#0ecb81' : '#f6465d'; // Verde se > 60k, vermelho se <
                log.innerText = "✅ Preço atualizado com sucesso!";
            } catch (error) {
                priceDisplay.innerText = "Erro";
                log.innerText = "❌ Erro ao buscar dados: " + error.message;
            }
        }

        // Função para enviar alerta no Telegram
        async function sendAlert() {
            if (currentPrice === 0) {
                alert("Espere o preço carregar primeiro!");
                return;
            }
            log.innerText = "Enviando alerta...";
            try {
                const response = await fetch('/api/telegram', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: `🔔 ALERTA DE TESTE!\n💰 Preço do BTC: $${currentPrice}\n🚀 Sistema funcionando!` 
                    })
                });
                const result = await response.json();
                
                if (result.ok) {
                    log.innerText = "✅ Alerta enviado para o Telegram!";
                } else {
                    log.innerText = "❌ Erro do Telegram: " + JSON.stringify(result);
                }
            } catch (error) {
                log.innerText = "❌ Erro na conexão com Telegram";
            }
        }

        // Carrega o preço ao abrir a página
        window.onload = fetchPrice;
        
        // Atualiza a cada 5 segundos
        setInterval(fetchPrice, 5000);
    </script>
</body>
</html>
